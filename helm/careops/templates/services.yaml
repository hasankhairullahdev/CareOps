# patient-service
apiVersion: v1
kind: Secret
metadata:
  name: patient-service-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "careops.labels" . | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Database=patient_db;Username=postgres;Password={{ .Values.postgres.password }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "careops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.patientService.replicas }}
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: {{ include "careops.image" (dict "registry" .Values.global.imageRegistry "name" "patient-service" "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.patientService.port }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: patient-service-secret
                  key: ConnectionStrings__DefaultConnection
            - name: Keycloak__Authority
              value: "http://keycloak:8080/realms/{{ .Values.keycloak.realmName }}"
            - name: Keycloak__Audience
              value: account
            - name: RabbitMQ__Host
              value: rabbitmq
            - name: RabbitMQ__Username
              value: {{ .Values.rabbitmq.username | quote }}
            - name: RabbitMQ__Password
              value: {{ .Values.rabbitmq.password | quote }}
            - name: Urls
              value: "http://+:{{ .Values.patientService.port }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.patientService.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
          resources: {{- toYaml .Values.patientService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "careops.labels" . | nindent 4 }}
spec:
  selector:
    app: patient-service
  ports:
    - port: {{ .Values.patientService.port }}
      targetPort: {{ .Values.patientService.port }}
---
