apiVersion: v1
kind: Secret
metadata:
  name: frontend-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "careops.labels" . | nindent 4 }}
type: Opaque
stringData:
  NEXTAUTH_SECRET: {{ .Values.frontend.nextauthSecret | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.frontend.keycloakClientSecret | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "careops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: {{ include "careops.image" (dict "registry" .Values.global.imageRegistry "name" "api-gateway" "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.apiGateway.port }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Keycloak__Authority
              value: "http://keycloak:8080/realms/{{ .Values.keycloak.realmName }}"
            - name: ReverseProxy__Clusters__patient-service__Destinations__primary__Address
              value: "http://patient-service:{{ .Values.patientService.port }}/"
            - name: ReverseProxy__Clusters__appointment-service__Destinations__primary__Address
              value: "http://appointment-service:{{ .Values.appointmentService.port }}/"
            - name: ReverseProxy__Clusters__pharmacy-service__Destinations__primary__Address
              value: "http://pharmacy-service:{{ .Values.pharmacyService.port }}/"
            - name: ReverseProxy__Clusters__billing-service__Destinations__primary__Address
              value: "http://billing-service:{{ .Values.billingService.port }}/"
            - name: ReverseProxy__Clusters__notification-service__Destinations__primary__Address
              value: "http://notification-service:{{ .Values.notificationService.port }}/"
            - name: Urls
              value: "http://+:{{ .Values.apiGateway.port }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiGateway.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources: {{- toYaml .Values.apiGateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "careops.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: {{ .Values.apiGateway.port }}
      targetPort: {{ .Values.apiGateway.port }}
      nodePort: {{ .Values.apiGateway.nodePort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "careops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "careops.image" (dict "registry" .Values.global.imageRegistry "name" "frontend" "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          env:
            - name: NEXTAUTH_URL
              value: {{ .Values.frontend.nextauthUrl | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.frontend.keycloakClientId | quote }}
            - name: KEYCLOAK_ISSUER
              value: {{ .Values.frontend.keycloakIssuer | quote }}
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.frontend.apiUrl | quote }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: NEXTAUTH_SECRET
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: KEYCLOAK_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources: {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "careops.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      nodePort: {{ .Values.frontend.nodePort }}
