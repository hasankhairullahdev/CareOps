name: Build & Push Docker Images

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/careops

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: patient-service
            context: services/patient-service
            dockerfile: services/patient-service/Dockerfile
          - service: appointment-service
            context: services/appointment-service
            dockerfile: services/appointment-service/Dockerfile
          - service: pharmacy-service
            context: services/pharmacy-service
            dockerfile: services/pharmacy-service/Dockerfile
          - service: billing-service
            context: services/billing-service
            dockerfile: services/billing-service/Dockerfile
          - service: notification-service
            context: services/notification-service
            dockerfile: services/notification-service/Dockerfile
          - service: api-gateway
            context: gateway/HospitalGateway
            dockerfile: gateway/HospitalGateway/Dockerfile
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
