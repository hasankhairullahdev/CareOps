apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: careops
data:
  NEXTAUTH_URL: "http://careops.local"
  KEYCLOAK_CLIENT_ID: "careops-frontend"
  KEYCLOAK_ISSUER: "http://auth.careops.local/realms/careops"
  NEXT_PUBLIC_API_URL: "http://api.careops.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secret
  namespace: careops
type: Opaque
stringData:
  NEXTAUTH_SECRET: "careops-nextauth-secret-change-me-in-production"
  KEYCLOAK_CLIENT_SECRET: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: careops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/hasankhairullahdev/careops/frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
            - secretRef:
                name: frontend-secret
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: careops
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
