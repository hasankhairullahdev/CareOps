apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: careops
data:
  ASPNETCORE_ENVIRONMENT: Production
  Keycloak__Authority: "http://keycloak:8080/realms/careops"
  ReverseProxy__Clusters__patient-service__Destinations__primary__Address: "http://patient-service:5001/"
  ReverseProxy__Clusters__appointment-service__Destinations__primary__Address: "http://appointment-service:5002/"
  ReverseProxy__Clusters__pharmacy-service__Destinations__primary__Address: "http://pharmacy-service:5003/"
  ReverseProxy__Clusters__billing-service__Destinations__primary__Address: "http://billing-service:5004/"
  ReverseProxy__Clusters__notification-service__Destinations__primary__Address: "http://notification-service:5005/"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: careops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/hasankhairullahdev/careops/api-gateway:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: api-gateway-config
          env:
            - name: Urls
              value: "http://+:5000"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: careops
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
