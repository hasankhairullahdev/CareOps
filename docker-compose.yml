version: '3.9'

services:
  # ─── Infrastructure ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hospital_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hospital_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: hospital_keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Backend Services ─────────────────────────────────────────────
  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
    container_name: hospital_patient_service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=patient_db;Username=postgres;Password=postgres"
      Keycloak__Authority: "http://keycloak:8080/realms/careops"
      Keycloak__Audience: "account"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Urls: "http://+:5001"
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    container_name: hospital_appointment_service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=appointment_db;Username=postgres;Password=postgres"
      Keycloak__Authority: "http://keycloak:8080/realms/careops"
      Keycloak__Audience: "account"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Urls: "http://+:5002"
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    build:
      context: ./gateway/HospitalGateway
      dockerfile: Dockerfile
    container_name: hospital_api_gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Keycloak__Authority: "http://keycloak:8080/realms/careops"
      ReverseProxy__Clusters__patient-service__Destinations__primary__Address: "http://patient-service:5001/"
      ReverseProxy__Clusters__appointment-service__Destinations__primary__Address: "http://appointment-service:5002/"
      ReverseProxy__Clusters__pharmacy-service__Destinations__primary__Address: "http://pharmacy-service:5003/"
      ReverseProxy__Clusters__billing-service__Destinations__primary__Address: "http://billing-service:5004/"
      ReverseProxy__Clusters__notification-service__Destinations__primary__Address: "http://notification-service:5005/"
      Urls: "http://+:5000"
    ports:
      - "5000:5000"
    depends_on:
      - patient-service
      - appointment-service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
